services:
  pkm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pkm-sandbox
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${TTYD_PORT:-7681}:7681"
    volumes:
      - .:/workspace
      - ${PKM_VAULT_PATH:-./vault}:/workspace/vault:ro
      - ${PKM_VAULT_PATH:-./vault}/${PKM_WRITE_DIR:-claude-workspace}:/workspace/vault/${PKM_WRITE_DIR:-claude-workspace}
      - pkm-claude-config:/home/claude/.claude
      - pkm-atuin-history:/home/claude/.local/share/atuin
    environment:
      - TERM=xterm-256color
      - TTYD_USER=${TTYD_USER:-}
      - TTYD_PASSWORD=${TTYD_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -so /dev/null -w '%{http_code}' http://localhost:7681/ | grep -qE '^(200|401)$'"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # ── Optional: resource limits ──
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #       cpus: "2.0"

volumes:
  pkm-claude-config:
  pkm-atuin-history:
