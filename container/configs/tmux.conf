# Minimal tmux config for the Agent Sandbox — persistence only, no UI.
#
# Validated empirically inside the sandbox: mouse/selection/copy-paste
# feel identical to plain bash because xterm.js handles them all.
# atuin's bash-preexec hooks fire correctly inside tmux with
# bash-preexec 0.5.0 + atuin 18.8.0 (the historical commit-f14ead7
# regression is gone).

# No status line — we use tmux purely as a persistence layer.
set -g status off

# Don't steal mouse events from xterm.js (selection, auto-copy,
# Ctrl+Shift+V paste all go straight through).
set -g mouse off

# Kill the prefix key. Only one tmux action is needed day-to-day —
# detach — and we bind it directly to Ctrl-\.
unbind C-b
bind-key -n C-\\ detach-client

# Truecolor passthrough for 256-color / 24-bit rendering.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Keep copy-mode keybindings out of the way (we never enter copy
# mode; xterm.js handles scrollback).
set -g mode-keys emacs
